# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.0.0
# ═══════════════════════════════════════════════════════════════


# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  # 时区配置（影响所有时间显示、调度系统判断、数据存储）
  # 常用时区：
  #   - Asia/Shanghai (北京时间 UTC+8)
  #   - America/New_York (美东时间 UTC-5/-4)
  #   - Europe/London (伦敦时间 UTC+0/+1)
  # 完整时区列表: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  timezone: "Asia/Shanghai"
  show_version_update: true           # 显示版本更新提示


# ===============================================================
# 1.5 调度系统 —— 什么时间做什么事
#
# 通过 timeline.yaml 里定义的时间段来自动决定：
#   - 什么时候推送通知
#   - 什么时候做 AI 分析
#   - 用什么报告模式
#
# 快速上手：选一个预设模板，改 preset 的值就行
#
#   always_on       → 全天候，有新增即推送
#   morning_evening → 全天推送 + 晚间当日汇总（推荐）
#   office_hours    → 工作日三段式（到岗→午间→收工），周末增量自由推
#   night_owl       → 午后速览 + 深夜全天汇总
#   custom          → 完全自定义，详见 timeline.yaml
#
# 详细时间线图请查看 config/timeline.yaml
# ===============================================================
schedule:
  enabled: true                         # 是否启用调度系统
  preset: "morning_evening"             # 预设模板名称（见上方说明）


# ===============================================================
# 2. 数据源 - 热榜平台
#
# enabled: 是否启用热榜抓取（总开关）
# sources: 平台列表
#   - id: 平台唯一标识（勿修改）
#   - name: 显示名称（可自定义，修改后不影响运行）
# ===============================================================
platforms:
  enabled: false                         # 是否启用热榜平台抓取
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "ifeng"
      name: "凤凰网"
    - id: "tieba"
      name: "贴吧"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "zhihu"
      name: "知乎"


# ===============================================================
# 3. 数据源 - RSS 订阅
# ===============================================================
rss:
  enabled: true
  sources:
    # US Trade Sources
    - name: "Variety - Main"
      url: "https://variety.com/feed/"
      enabled: true
    - name: "Variety - International"
      url: "https://variety.com/feed/international/"
      enabled: true
    - name: "Deadline"
      url: "https://deadline.com/feed/"
      enabled: true
    - name: "THR - Main"
      url: "https://www.hollywoodreporter.com/feed/"
      enabled: true
    - name: "THR - Film"
      url: "https://www.hollywoodreporter.com/c/movies/feed/"
      enabled: true
    - name: "Box Office Mojo - Stories"
      url: "https://www.boxofficemojo.com/data/rss.php?file=topstories.xml"
      enabled: true
    - name: "Box Office Mojo - Charts"
      url: "https://www.boxofficemojo.com/data/rss.php?file=charts.xml"
      enabled: true
    - name: "IMDb News"
      url: "https://www.imdb.com/news/rss"
      enabled: true
    
    # International Sources
    - name: "BBC Entertainment"
      url: "http://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml"
      enabled: true
    - name: "The Guardian Film"
      url: "https://www.theguardian.com/film/rss"
      enabled: true
    - name: "Bollywood Hungama"
      url: "https://www.bollywoodhungama.com/feed/"
      enabled: true
    - name: "Soompi (K-Entertainment)"
      url: "https://www.soompi.com/feed"
      enabled: true
    - name: "Anime News Network"
      url: "https://www.animenewsnetwork.com/news/rss.xml"
      enabled: true


# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "current"                     # 可选: daily | current | incremental

  display_mode: "keyword"             # 分组维度: keyword | platform

  # 关键词组排序方式
  sort_by_position_first: false

  rank_threshold: 5                   # 排名高亮阈值

  max_news_per_keyword: 0             # 每个关键词最大显示数量（0=不限制）


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true

  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: []
    max_items: 20


# ===============================================================
# 6. 推送通知
# ===============================================================
notification:
  enabled: true

  channels:
    feishu:
      webhook_url: ""

    dingtalk:
      webhook_url: ""

    wework:
      webhook_url: ""
      msg_type: "markdown"

    telegram:
      bot_token: ""
      chat_id: ""

    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""

    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""

    bark:
      url: ""

    slack:
      webhook_url: ""

    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"

  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 0

  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []


# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true
  language: "English"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true
  include_standalone: false
  include_rank_timeline: true


# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: false
  language: "English"
  prompt_file: "ai_translation_prompt.txt"


# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
