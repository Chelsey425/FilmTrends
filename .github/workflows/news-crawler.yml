name: Get Hot News

on:
  workflow_dispatch:      # Allows you to manually run it anytime
  schedule:
    - cron: '0 8 * * *'   # Runs once daily at 8:00 AM UTC (adjust to your timezone)

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run news crawler
        run: python trendradar/main_.py
        
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: news-output
          path: output/
